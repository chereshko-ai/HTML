<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="app.css">
    <title>Вход за регистрирани потребители</title>
</head>
<body>
    <h1>Вход само за регистрирани потребители.</h1>
    <p>Използвайте вашето потребителско име предоставено след заплащането на членския внос към партията!</p>
    <form action="/api/v1/login-form" method="get">
        <label for="user-login">Потребител:</label>
        <input id="user-login" type="text" name="user-login" placeholder="Въведете потребител">
        <label for="user-password">Парола</label>
        <input id="user-password" type="password" name="user-password" placeholder="Въведете парола!">
        <button type="submit" style="cursor: pointer;">Влез!</button>
</form>
    <hr>
    <ul>
        <li>
            <a href="index.html"><img src="icons/home-outline.svg" alt="Начало" width="25px">Начална Страница.</a>
        </li>
        <li>
            <a href="login.html"><img src="icons/log-in-outline.svg" alt="Вход" width="25px">Влезте!</a>             </li>
        <li>
            <a href="register.html"><img src="icons/people-outline.svg" alt="Регистрация" width="25px">Регистрирай се!</a>    
        </li>
        </ul>
</body>
</html>
